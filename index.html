<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegatTracker – Accesso</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0a0f1a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-box {
  background: #111827;
  border: 1px solid #1e3a5a;
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.logo { font-size: 36px; margin-bottom: 8px; }
.logo-text { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
.logo-text span { color: #60a5fa; }
.logo-sub { font-size: 13px; color: #4a6080; margin-bottom: 36px; line-height: 1.6; }
.form-group { text-align: left; margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; color: #4a6080; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.form-group input {
  width: 100%;
  background: #0f172a;
  border: 1px solid #1e3a5a;
  color: #e2e8f0;
  padding: 11px 14px;
  border-radius: 8px;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.form-group input:focus { border-color: #3b82f6; }
.btn-login {
  width: 100%;
  background: #1d4ed8;
  color: #fff;
  border: none;
  padding: 13px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: background .2s;
}
.btn-login:hover { background: #2563eb; }
.error-msg {
  background: #7f1d1d;
  color: #fca5a5;
  border-radius: 7px;
  padding: 10px 14px;
  font-size: 13px;
  margin-top: 14px;
  display: none;
}
.footer { margin-top: 32px; font-size: 11px; color: #2a3a5a; }
</style>
</head>
<body>

<div class="login-box">
  <div class="logo">⚗️</div>
  <div class="logo-text"><span>Lega</span>Tracker</div>
  <div class="logo-sub">
    Monitoraggio analisi lega saldante<br>
    Inserisci le credenziali ricevute
  </div>

  <div class="form-group">
    <label>Codice cliente</label>
    <input type="text" id="f-client" placeholder="es. AXEL" autocomplete="off" autocapitalize="characters"
      onkeydown="if(event.key==='Enter') document.getElementById('f-pass').focus()">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="f-pass" placeholder="Password fornita da Cabelpin"
      onkeydown="if(event.key==='Enter') doLogin()">
  </div>
  <button class="btn-login" onclick="doLogin()">🔐 Accedi alla dashboard</button>
  <div class="error-msg" id="error-msg">❌ Codice cliente o password errati.</div>

  <div class="footer">Cabelpin Electronics · Sistema interno analisi lega</div>
</div>

<script>
// ─── CONFIGURAZIONE ────────────────────────────────────────────────────────
// PASSWORD GLOBALE: cambiala qui quando vuoi
const GLOBAL_PASSWORD = "cabelpin2026";

// CLIENTI ATTIVI: aggiungi/rimuovi clienti qui
// "CODICE": "nomefile.json"
const CLIENTI = {
  "AXEL":      "clienti/AXEL.json",
  "CLIENTEB":  "clienti/CLIENTEB.json",
  "CLIENTEC":  "clienti/CLIENTEC.json",
};
// ──────────────────────────────────────────────────────────────────────────

function doLogin() {
  const cliente = document.getElementById('f-client').value.trim().toUpperCase();
  const pass    = document.getElementById('f-pass').value.trim();
  const errEl   = document.getElementById('error-msg');

  if (pass !== GLOBAL_PASSWORD || !CLIENTI[cliente]) {
    errEl.style.display = 'block';
    document.getElementById('f-pass').value = '';
    return;
  }
  errEl.style.display = 'none';
  // Redirect alla dashboard con parametri
  window.location.href = `dashboard.html?cliente=${encodeURIComponent(cliente)}&file=${encodeURIComponent(CLIENTI[cliente])}&auth=${btoa(GLOBAL_PASSWORD)}`;
}
</script>
</body>
</html>
